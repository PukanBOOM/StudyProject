openapi: 3.0.4
info:
  title: Comparator — Price Comparison Service
  description: API сервиса сравнения цен на товары в разных магазинах
  version: 1.0.0
  contact:
    name: Levin

paths:
  /v1/product/create:
    post:
      tags: [ product ]
      summary: Создать товар
      operationId: productCreate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCreateResponse'

  /v1/product/read:
    post:
      tags: [ product ]
      summary: Прочитать товар
      operationId: productRead
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductReadRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductReadResponse'

  /v1/product/update:
    post:
      tags: [ product ]
      summary: Обновить товар
      operationId: productUpdate
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductUpdateResponse'

  /v1/product/delete:
    post:
      tags: [ product ]
      summary: Удалить товар
      operationId: productDelete
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductDeleteRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductDeleteResponse'

  /v1/product/search:
    post:
      tags: [ product ]
      summary: Поиск товаров
      operationId: productSearch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductSearchRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductSearchResponse'

components:
  schemas:

    # ===== Базовые типы =====

    IRequest:
      type: object
      description: Базовый интерфейс всех запросов
      discriminator:
        propertyName: requestType
        mapping:
          productCreate: '#/components/schemas/ProductCreateRequest'
          productRead:   '#/components/schemas/ProductReadRequest'
          productUpdate: '#/components/schemas/ProductUpdateRequest'
          productDelete: '#/components/schemas/ProductDeleteRequest'
          productSearch: '#/components/schemas/ProductSearchRequest'
      properties:
        requestType:
          type: string
          description: Поле-дискриминатор для типа запроса
        requestId:
          type: string
          description: Идентификатор запроса для трассировки

    IResponse:
      type: object
      description: Базовый интерфейс всех ответов
      discriminator:
        propertyName: responseType
        mapping:
          productCreate: '#/components/schemas/ProductCreateResponse'
          productRead:   '#/components/schemas/ProductReadResponse'
          productUpdate: '#/components/schemas/ProductUpdateResponse'
          productDelete: '#/components/schemas/ProductDeleteResponse'
          productSearch: '#/components/schemas/ProductSearchResponse'
      properties:
        responseType:
          type: string
          description: Поле-дискриминатор для типа ответа
        requestId:
          type: string
          description: Идентификатор запроса (эхо)
        result:
          $ref: '#/components/schemas/ResponseResult'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/Error'

    ResponseResult:
      type: string
      enum:
        - success
        - error

    Error:
      type: object
      properties:
        code:
          type: string
        group:
          type: string
        field:
          type: string
        message:
          type: string

    # ===== Доменные объекты =====

    ProductCategory:
      type: string
      description: Категория товара
      enum:
        - electronics
        - clothing
        - food
        - books
        - other

    BaseProduct:
      type: object
      description: Общие поля товара
      properties:
        name:
          type: string
          description: Название товара
        description:
          type: string
          description: Описание товара
        category:
          $ref: '#/components/schemas/ProductCategory'

    ProductCreateObject:
      allOf:
        - $ref: '#/components/schemas/BaseProduct'

    ProductUpdateObject:
      allOf:
        - $ref: '#/components/schemas/BaseProduct'
        - type: object
          properties:
            id:
              type: string
            lock:
              type: string

    ProductResponseObject:
      allOf:
        - $ref: '#/components/schemas/BaseProduct'
        - type: object
          properties:
            id:
              type: string
            lock:
              type: string
            offers:
              type: array
              items:
                $ref: '#/components/schemas/OfferObject'

    OfferObject:
      type: object
      description: Предложение магазина
      properties:
        shopName:
          type: string
        price:
          type: number
          format: double
        url:
          type: string

    ProductReadObject:
      type: object
      properties:
        id:
          type: string

    ProductDeleteObject:
      type: object
      properties:
        id:
          type: string
        lock:
          type: string

    ProductSearchFilter:
      type: object
      properties:
        searchString:
          type: string
          description: Строка поиска по имени/описанию
        category:
          $ref: '#/components/schemas/ProductCategory'

    # ===== Debug / Stubs =====

    ProductDebug:
      type: object
      properties:
        mode:
          $ref: '#/components/schemas/RequestDebugMode'
        stub:
          $ref: '#/components/schemas/RequestDebugStubs'

    RequestDebugMode:
      type: string
      enum:
        - prod
        - test
        - stub

    RequestDebugStubs:
      type: string
      enum:
        - success
        - not_found
        - bad_id
        - bad_title
        - bad_description
        - bad_category
        - cannot_delete
        - bad_search_string

    # ===== Запросы =====

    ProductCreateRequest:
      allOf:
        - $ref: '#/components/schemas/IRequest'
        - type: object
          properties:
            product:
              $ref: '#/components/schemas/ProductCreateObject'
            debug:
              $ref: '#/components/schemas/ProductDebug'

    ProductReadRequest:
      allOf:
        - $ref: '#/components/schemas/IRequest'
        - type: object
          properties:
            product:
              $ref: '#/components/schemas/ProductReadObject'
            debug:
              $ref: '#/components/schemas/ProductDebug'

    ProductUpdateRequest:
      allOf:
        - $ref: '#/components/schemas/IRequest'
        - type: object
          properties:
            product:
              $ref: '#/components/schemas/ProductUpdateObject'
            debug:
              $ref: '#/components/schemas/ProductDebug'

    ProductDeleteRequest:
      allOf:
        - $ref: '#/components/schemas/IRequest'
        - type: object
          properties:
            product:
              $ref: '#/components/schemas/ProductDeleteObject'
            debug:
              $ref: '#/components/schemas/ProductDebug'

    ProductSearchRequest:
      allOf:
        - $ref: '#/components/schemas/IRequest'
        - type: object
          properties:
            productFilter:
              $ref: '#/components/schemas/ProductSearchFilter'
            debug:
              $ref: '#/components/schemas/ProductDebug'

    # ===== Ответы =====

    ProductCreateResponse:
      allOf:
        - $ref: '#/components/schemas/IResponse'
        - type: object
          properties:
            product:
              $ref: '#/components/schemas/ProductResponseObject'

    ProductReadResponse:
      allOf:
        - $ref: '#/components/schemas/IResponse'
        - type: object
          properties:
            product:
              $ref: '#/components/schemas/ProductResponseObject'

    ProductUpdateResponse:
      allOf:
        - $ref: '#/components/schemas/IResponse'
        - type: object
          properties:
            product:
              $ref: '#/components/schemas/ProductResponseObject'

    ProductDeleteResponse:
      allOf:
        - $ref: '#/components/schemas/IResponse'
        - type: object
          properties:
            product:
              $ref: '#/components/schemas/ProductResponseObject'

    ProductSearchResponse:
      allOf:
        - $ref: '#/components/schemas/IResponse'
        - type: object
          properties:
            products:
              type: array
              items:
                $ref: '#/components/schemas/ProductResponseObject'