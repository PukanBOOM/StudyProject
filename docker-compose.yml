# docker-compose.yml
version: '3.8'

services:
  # Приложение PricePulse
  pricepulse-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pricepulse-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/pricepulse
      - SPRING_DATASOURCE_USERNAME=pricepulse_user
      - SPRING_DATASOURCE_PASSWORD=pricepulse_pass
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - KEYCLOAK_AUTH_SERVER_URL=http://keycloak:8080/auth
      - SPRING_OPENSEARCH_URIS=http://opensearch:9200
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pricepulse-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: pricepulse-postgres
    environment:
      - POSTGRES_DB=pricepulse
      - POSTGRES_USER=pricepulse_user
      - POSTGRES_PASSWORD=pricepulse_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - pricepulse-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pricepulse_user -d pricepulse"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis для кэширования
  redis:
    image: redis:7-alpine
    container_name: pricepulse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - pricepulse-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Keycloak для авторизации
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.0
    container_name: pricepulse-keycloak
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
      - KC_FEATURES=scripts
      - KC_HTTP_ENABLED=true
      - KC_HOSTNAME_STRICT=false
      - KC_HOSTNAME_STRICT_HTTPS=false
    ports:
      - "9090:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
      - keycloak_data:/opt/keycloak/data
    command:
      - start-dev
      - --import-realm
    networks:
      - pricepulse-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/realms/master"]
      interval: 30s
      timeout: 10s
      retries: 5

  # OpenSearch для мониторинга и логов
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: pricepulse-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=admin
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - pricepulse-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  # OpenSearch Dashboards
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: pricepulse-opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - pricepulse-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5601/api/status"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  keycloak_data:
  opensearch_data:

networks:
  pricepulse-network:
    driver: bridge