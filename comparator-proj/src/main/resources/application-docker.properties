# src/main/resources/application-docker.properties
# Database
spring.datasource.url=jdbc:postgresql://postgres:5432/pricepulse
spring.datasource.username=pricepulse_user
spring.datasource.password=pricepulse_pass

# Redis
spring.redis.host=redis
spring.redis.port=6379

# OpenSearch
spring.opensearch.uris=http://opensearch:9200

# Keycloak
keycloak.auth-server-url=http://keycloak:8080/auth
keycloak.realm=pricepulse
keycloak.resource=pricepulse-backend
keycloak.credentials.secret=backend-secret

# Application
server.port=8080
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always